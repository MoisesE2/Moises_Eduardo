# Configuração para Dockploy
# O Dockploy gerencia SSL através de proxy reverso
# O nginx dentro do container escuta apenas na porta 80 (HTTP)
#
# Dois sites no mesmo container:
#   - moises.gcodevs.com  -> index.html   (portfólio para recrutadores)
#   - gcodevs.com         -> gcodevs.html (site comercial Gco Devs)

# Cache e gzip compartilhados
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_types
    application/json
    application/javascript
    application/xml+rss
    application/atom+xml
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

# --- Site comercial: gcodevs.com ---
server {
    listen 80;
    listen [::]:80;
    server_name gcodevs.com www.gcodevs.com;

    root /usr/share/nginx/html;
    index gcodevs.html;

    location / {
        try_files $uri $uri/ /gcodevs.html;
    }

    # robots e sitemap próprios do domínio comercial
    location = /robots.txt {
        try_files /robots-gcodevs.txt =404;
    }
    location = /sitemap.xml {
        try_files /sitemap-gcodevs.xml =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(mp4|webm|ogg)$ {
        expires 1y;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: ws: wss: data: blob: 'unsafe-inline'; frame-ancestors 'self';" always;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}

# --- Portfólio: moises.gcodevs.com (default para qualquer outro hostname) ---
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name moises.gcodevs.com _;

    root /usr/share/nginx/html;
    index index.html;

    # Configuração para SPA (Single Page Application)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Configuração para arquivos de vídeo
    location ~* \.(mp4|webm|ogg)$ {
        expires 1y;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Configuração de segurança
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: ws: wss: data: blob: 'unsafe-inline'; frame-ancestors 'self';" always;

    # HSTS - apenas se o proxy reverso suportar HTTPS
    # O Dockploy geralmente adiciona isso automaticamente
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}
