    <!-- JSON-LD: FAQ (manter em sincronia com a seção FAQ visível da página) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Quanto custa um site?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "O valor depende do tipo de projeto: um link-in-bio é mais simples que uma loja virtual completa. O orçamento é gratuito e sem compromisso — basta chamar no WhatsApp descrevendo o que você precisa."
          }
        },
        {
          "@type": "Question",
          "name": "Quanto tempo leva para o site ficar pronto?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Link-in-bio e landing pages costumam ficar prontos em 1 a 2 semanas. Projetos maiores, como lojas virtuais, têm prazo definido junto com o orçamento — e o prazo combinado é cumprido."
          }
        },
        {
          "@type": "Question",
          "name": "O site funciona bem no celular?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim. Todos os projetos são desenvolvidos com abordagem mobile-first: o site é pensado primeiro para o celular e se adapta a qualquer tamanho de tela."
          }
        },
        {
          "@type": "Question",
          "name": "Preciso pagar hospedagem e domínio?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim, hospedagem e domínio são custos à parte, mas são baixos. Orientamos você em toda a contratação e deixamos o site publicado e funcionando no seu domínio."
          }
        },
        {
          "@type": "Question",
          "name": "Preciso ter logo e textos prontos?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Não. Se você já tiver, ótimo — usamos o seu material. Se não tiver, o briefing serve para organizar isso junto com você, e o site pode ser montado com uma identidade simples e profissional."
          }
        },
        {
          "@type": "Question",
          "name": "Trabalham com o meu segmento?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Muito provavelmente sim. Já entregamos projetos para saúde, igrejas e comércio — a estrutura de um bom site se adapta a qualquer área. Conte o seu caso no WhatsApp e dizemos como faríamos."
          }
        },
        {
          "@type": "Question",
          "name": "E depois de entregue, tem suporte?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim. Todo projeto inclui suporte pós-entrega para ajustes e correções. Também oferecemos planos de manutenção para quem precisa de atualizações frequentes."
          }
        },
        {
          "@type": "Question",
          "name": "O que eu preciso enviar para começar?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Textos, imagens e referências de sites que você gosta. Se você não tiver tudo pronto, sem problema: o briefing inicial serve exatamente para organizar isso junto com você."
          }
        }
      ]
    }
    </script>
